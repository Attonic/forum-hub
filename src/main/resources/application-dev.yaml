spring:
  application:
    name: Forum Hub

  datasource:
    username: ${DB_USER}
    password: ${DB_PASSWORD}
    driver-class-name: com.mysql.cj.jdbc.Driver
    url: ${DB_URL}


  flyway:
    enabled: true
    locations: classpath:/db/migration
    baseline-on-migrate: true

  jpa:
    show-sql: true
    hibernate:
      ddl-auto: validate
    properties:
      hibernate:
        format_sql: true


  sql:
    init:
      mode: never

api:
  security:
    token:
      secret: ${JWT_SECRET}