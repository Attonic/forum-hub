spring:
  application:
    name: Forum Hub

  datasource:
    username: ${DB_USER}
    password: ${DB_PASSWORD}
    driver-class-name: com.mysql.cj.jdbc.Driver
    url: ${DB_URL}

  jpa:
    show-sql: true
    properties:
      hibernate:
        format_sql: true


  sql:
    init:
      mode: never

api:
  security:
    token:
      secret: ${JWT_SECRET}